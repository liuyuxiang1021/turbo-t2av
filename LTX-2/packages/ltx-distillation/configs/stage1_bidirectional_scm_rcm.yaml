# Stage 1: SCM-only with damped time-modulation LR.
# Tests whether collapse is driven primarily by LTX time branch parameters.

checkpoint_path: /data/datasets/turbodiff_datasets_and_ckpt/omniforcing/ltx-2-19b-dev.safetensors
resume_checkpoint: /data/datasets/turbodiff_datasets_and_ckpt/my_omniforcing/0519_211519_scm_from_dcm_warmup/checkpoints/checkpoint_000700/model.pth
gemma_path: /data/datasets/turbodiff_datasets_and_ckpt/omniforcing/gemma-3-12b-it-qat-q4_0-unquantized

model_name: ltx2_av

generator_grad: {model: true}
real_score_grad: {model: false}
fake_score_grad: {model: false}

dmd_enabled: false
critic_enabled: false
dmd_style: rcm_trig
dmd_p_D_shift: 5.0
backward_trig_timesteps: [1.5, 1.4, 1.0]
denoising_step_list: [1000, 757, 522, 0]
num_train_timestep: 1000
real_video_guidance_scale: 5.0
real_audio_guidance_scale: 5.0
denoising_loss_type: velocity
distillation_loss: dmd

generator_task: bidirectional_av
real_task_type: bidirectional_av
fake_task_type: bidirectional_av

# ===== SCM (exact rCM config) =====
scm_enabled: true
dcm_enabled: false
dcm_weight: 1.0
dcm_loss_scale: 100.0
dcm_total_steps: 48
scm_data_path: /data/datasets/turbodiff_datasets_and_ckpt/tavgbench/omniforcing_latent_100k
scm_weight: 1.0
scm_loss_scale: 100.0
scm_p_G_mean: 1.5               # rCM 14B: median sigma=exp(1.5)≈4.5, noise-dominant
scm_p_G_std: 1.6
scm_consistency_boost: 1.0       # rCM-style single norm, no boost needed
scm_fd_type: 0                   # full JVP; fd_type=1 did not remove the collapse signal
scm_fd_size: 0.0001
scm_tangent_warmup: 0            # match 0517_112904 fast-trend run
scm_strict_rcm: true
scm_diagnostic_mode: false
scm_tangent_clip_mean: 20.0        # p99 clip: exact 112904 setting
scm_student_field_clip_mean: 0     # not in 112904
scm_loss_fp32: true                # keep SCM target construction/loss in fp32
scm_time_eps: 0.0001
scm_jvp_impl: internal
scm_g_normalization: per_modality  # separate norm per modality; AV both contribute
video_loss_weight: 1.0
audio_loss_weight: 1              # full AV, as in 0517_112904

# ===== Optimizer =====
lr: 1.0e-05
generator_lr: 1.0e-05
generator_adaln_lr: 3.0e-06
generator_output_scale_shift_lr: 1.0e-06
critic_lr: 2.0e-06
beta1: 0.0
beta2: 0.999
weight_decay: 0.01
dfake_gen_update_ratio: 3
max_grad_norm: 99999.0
scheduler_type: cosine_warmup
warmup_steps: 0
max_steps: 800
min_lr: 1.0e-05

ema_enabled: false

# ===== Data =====
mixed_precision: true
gradient_checkpointing: true
batch_size: 1
data_path: /data/datasets/turbodiff_datasets_and_ckpt/tavgbench/release_prompts.txt
backward_simulation: true
num_frames: 121
video_height: 512
video_width: 768

# ===== FSDP =====
sharding_strategy: full_shard
fsdp_use_orig_params: true
generator_fsdp_wrap_strategy: transformer
real_score_cpu_offload: false
text_encoder_cpu_offload: false
real_score_fsdp_wrap_strategy: size
fake_score_fsdp_wrap_strategy: size
text_encoder_fsdp_wrap_strategy: size

# ===== Output =====
output_path: /data/datasets/turbodiff_datasets_and_ckpt/my_omniforcing
log_iters: 1
train_log_all_scalars: true
checkpoint_iters: 10
skip_initial_checkpoint: true

benchmark_enabled: true
benchmark_min_step: 0
benchmark_iters: 50
teacher_benchmark_enabled: true     # skip teacher refs for faster startup; enable for debug
teacher_benchmark_num_inference_steps: 4
teacher_benchmark_video_guidance_scale: 5.0
teacher_benchmark_audio_guidance_scale: 5.0
teacher_benchmark_mode: rcm_trig
teacher_benchmark_include_native_rf_reference: true
teacher_benchmark_include_40step_reference: true
teacher_benchmark_40step_num_inference_steps: 40
student_benchmark_use_cfg: false     # SCM distills CFG teacher into conditional student; avoid double CFG at inference.
benchmark_num_prompts: 8

wandb_project: OmniForcing
wandb_entity: liuyuxiang1021-tianjin-university
wandb_name: scm_from_dcm_warmup
wandb_api_key: "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"

seed: 42
no_visualize: false
no_save: false

negative_prompt: "blurry, out of focus, overexposed, underexposed, low contrast, washed out colors, excessive noise, grainy texture, poor lighting, flickering, motion blur, distorted proportions, unnatural skin tones, deformed facial features, asymmetrical face, missing facial features, extra limbs, disfigured hands, wrong hand count, artifacts around text, inconsistent perspective, camera shake, incorrect depth of field, background too sharp, background clutter, distracting reflections, harsh shadows, inconsistent lighting direction, color banding, cartoonish rendering, 3D CGI look, unrealistic materials, uncanny valley effect, incorrect ethnicity, wrong gender, exaggerated expressions, wrong gaze direction, mismatched lip sync, silent or muted audio, distorted voice, robotic voice, echo, background noise, off-sync audio, incorrect dialogue, added dialogue, repetitive speech, jittery movement, awkward pauses, incorrect timing, unnatural transitions, inconsistent framing, tilted camera, flat lighting, inconsistent tone, cinematic oversaturation, stylized filters, or AI artifacts."
