# SCM+DMD from SCM ckpt 1000 — aligned with DMD-only training dynamics
# Fixes:
#   - separate_generator_critic_phases: false (gen+critic train together, like DMD-only)
#   - share_scm_dmd_batch: true (SCM and DMD use same text prompts)
#   - dmd_weight: 1.0 (match DMD-only)
#   - scm_loss_scale: 100.0 (match SCM-only)
#   - sharding_strategy: hybrid_full + size wrap (match DMD-only)

checkpoint_path: /data/datasets/turbodiff_datasets_and_ckpt/turbo-t2av/ltx-2-19b-dev.safetensors
resume_checkpoint: /data/datasets/turbodiff_datasets_and_ckpt/my_turbo-t2av/0520_011955_scm_from_dcm_warmup/checkpoints/checkpoint_001000/model.pth
checkpoint_load_mode: parallel
resume_training_state: false
gemma_path: /data/datasets/turbodiff_datasets_and_ckpt/turbo-t2av/gemma-3-12b-it-qat-q4_0-unquantized
model_name: ltx2_av

generator_grad:
  model: true
real_score_grad:
  model: false
fake_score_grad:
  model: true

dmd_enabled: true
critic_enabled: true
dmd_weight: 1.0
dmd_style: rcm_trig
dmd_p_D_shift: 5.0
backward_trig_timesteps:
- 1.5
- 1.4
- 1.0
denoising_step_list:
- 1000
- 757
- 522
- 0
num_train_timestep: 1000
real_video_guidance_scale: 3.0
real_audio_guidance_scale: 5.0
denoising_loss_type: velocity
distillation_loss: dmd
generator_task: bidirectional_av
real_task_type: bidirectional_av
fake_task_type: bidirectional_av

# ===== SCM =====
scm_enabled: true
dcm_enabled: false
scm_data_path: /data/datasets/turbodiff_datasets_and_ckpt/tavgbench/turbo-t2av_latent_100k
scm_weight: 1.0
scm_loss_scale: 100.0
scm_p_G_mean: 0.7
scm_p_G_std: 1.6
scm_consistency_boost: 1.0
scm_fd_type: 0
scm_fd_size: 0.0001
scm_tangent_warmup: 200
scm_strict_rcm: true
scm_diagnostic_mode: false
scm_tangent_clip_mean: 20.0
scm_student_field_clip_mean: 0
scm_loss_fp32: true
scm_time_eps: 0.0001
scm_jvp_impl: internal
scm_g_normalization: per_modality
video_loss_weight: 1.0
audio_loss_weight: 1

# ===== Optimizer =====
lr: 2.0e-05
generator_lr: 2.0e-05
critic_lr: 2.0e-05
beta1: 0.0
beta2: 0.999
weight_decay: 0.01
dfake_gen_update_ratio: 5
max_grad_norm: 99999.0
scheduler_type: constant
warmup_steps: 0
max_steps: 30000
min_lr: 2.0e-06

# ===== Key: critic and generator train together =====
separate_generator_critic_phases: false
share_scm_dmd_batch: true

ema_enabled: false

# ===== Data =====
mixed_precision: true
gradient_checkpointing: true
batch_size: 1
data_path: /data/datasets/turbodiff_datasets_and_ckpt/tavgbench/release_prompts.txt
backward_simulation: true
num_frames: 121
video_height: 512
video_width: 768

# ===== FSDP =====
sharding_strategy: full_shard
fsdp_use_orig_params: true
generator_fsdp_wrap_strategy: transformer
real_score_cpu_offload: false
text_encoder_cpu_offload: false
real_score_fsdp_wrap_strategy: size
fake_score_fsdp_wrap_strategy: size
text_encoder_fsdp_wrap_strategy: size

# ===== Output =====
output_path: /data/datasets/turbodiff_datasets_and_ckpt/my_turbo-t2av
log_iters: 1
train_log_all_scalars: true
checkpoint_iters: 500
skip_initial_checkpoint: true

benchmark_enabled: true
benchmark_min_step: 0
benchmark_iters: 50
teacher_benchmark_enabled: false
student_benchmark_use_cfg: false
benchmark_num_prompts: 8

wandb_project: turbo-t2av
wandb_entity: liuyuxiang1021-tianjin-university
wandb_name: scm_dmd_1to1_nosepcrit_sharedbatch
wandb_api_key: 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

seed: 42
no_visualize: false
no_save: false
negative_prompt: "blurry, out of focus, overexposed, underexposed, low contrast, washed out colors, excessive noise, grainy texture, poor lighting, flickering, motion blur, distorted proportions, unnatural skin tones, deformed facial features, asymmetrical face, missing facial features, extra limbs, disfigured hands, wrong hand count, artifacts around text, inconsistent perspective, camera shake, incorrect depth of field, background too sharp, background clutter, distracting reflections, harsh shadows, inconsistent lighting direction, color banding, cartoonish rendering, 3D CGI look, unrealistic materials, uncanny valley effect, incorrect ethnicity, wrong gender, exaggerated expressions, wrong gaze direction, mismatched lip sync, silent or muted audio, distorted voice, robotic voice, echo, background noise, off-sync audio, incorrect dialogue, added dialogue, repetitive speech, jittery movement, awkward pauses, incorrect timing, unnatural transitions, inconsistent framing, tilted camera, flat lighting, inconsistent tone, cinematic oversaturation, stylized filters, or AI artifacts."
