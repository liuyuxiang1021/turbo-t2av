# Stage 1: SCM-only (aligned with rCM paper) — no DMD/critic
# Simpler, more memory-efficient, fewer moving parts
checkpoint_path: /data/datasets/turbodiff_datasets_and_ckpt/TurboT2AV/ltx-2-19b-dev.safetensors
gemma_path: /data/datasets/turbodiff_datasets_and_ckpt/TurboT2AV/gemma-3-12b-it-qat-q4_0-unquantized

model_name: ltx2_av

generator_grad:
  model: true
real_score_grad:
  model: false
fake_score_grad:
  model: false    # No critic in SCM-only

# ===== No DMD / No Critic =====
dmd_enabled: false
critic_enabled: false
dmd_style: rcm_trig
dmd_p_D_shift: 5.0

backward_trig_timesteps: [1.5, 1.4, 1.0]
denoising_step_list: [1000, 757, 522, 0]
num_train_timestep: 1000

real_video_guidance_scale: 3.0
real_audio_guidance_scale: 5.0

generator_task: bidirectional_av
real_task_type: bidirectional_av
fake_task_type: bidirectional_av

denoising_loss_type: velocity
distillation_loss: dmd

# ===== SCM (aligned with rCM) =====
scm_enabled: true
scm_data_path: /data/datasets/turbodiff_datasets_and_ckpt/tavgbench/TurboT2AV_latent_100k
scm_batch_size: 1
scm_max_pair: 100000000
scm_weight: 1.0
scm_loss_scale: 100.0
scm_p_G_mean: -0.8                # rCM LogNormal
scm_p_G_std: 1.6
scm_fd_type: 0                    # Exact JVP
scm_strict_rcm: true
scm_fd_size: 1.0e-4
scm_tangent_warmup: 1000          # Longer JVP warmup
scm_time_eps: 1.0e-4
scm_jvp_impl: internal            # torch_func crashes with FSDP in PT2.7
scm_g_normalization: per_modality

# ===== Optimizer (aligned) =====
lr: 2.0e-06                       # Stable growth; higher lr destabilizes (1e-5 → 7.9M)
generator_lr: 2.0e-06
critic_lr: 2.0e-06

beta1: 0.0                        # No momentum
beta2: 0.999
weight_decay: 0.01
dfake_gen_update_ratio: 1         # Generator trains every step (no critic)
max_grad_norm: 99999.0            # Effectively disabled

# ===== EMA =====
ema_enabled: false                # Disable for now — state_dict + FSDP causes hangs.
                                    # Re-enable after training stable at iter 2000+.

# ===== Data =====
mixed_precision: true
gradient_checkpointing: true
batch_size: 1
data_path: /data/datasets/turbodiff_datasets_and_ckpt/tavgbench/release_prompts.txt
backward_simulation: true          # Required for data loading (even with DMD disabled)

num_frames: 121
video_height: 512
video_width: 768

# ===== FSDP (matching working config) =====
sharding_strategy: full_shard
fsdp_use_orig_params: true

generator_fsdp_wrap_strategy: transformer
real_score_cpu_offload: false
text_encoder_cpu_offload: false
real_score_fsdp_wrap_strategy: size
fake_score_fsdp_wrap_strategy: size
text_encoder_fsdp_wrap_strategy: size

# ===== Output =====
output_path: /data/datasets/turbodiff_datasets_and_ckpt/my_TurboT2AV
log_iters: 1                      # Log every step
train_log_all_scalars: true
checkpoint_iters: 500
skip_initial_checkpoint: true     # Don't gather 19B params at step 0

resume_checkpoint: /data/datasets/turbodiff_datasets_and_ckpt/my_TurboT2AV/0512_013058_stage1_scm_aligned/checkpoints/checkpoint_001000/model.pt

# ===== Formal training =====

benchmark_enabled: true
benchmark_min_step: 1               # Skip step 0 only (avoids FSDP init deadlock)
benchmark_iters: 50                 # Run every 50 steps
benchmark_num_prompts: 8

# ===== W&B =====
wandb_project: TurboT2AV
wandb_entity: liuyuxiang1021-tianjin-university
wandb_name: stage1_scm_aligned

seed: 42
benchmark_seed: 12345
benchmark_video_fps: 24
benchmark_audio_sample_rate: 24000
teacher_benchmark_enabled: true
teacher_benchmark_num_inference_steps: 40
teacher_benchmark_video_guidance_scale: 3.0
teacher_benchmark_audio_guidance_scale: 5.0
teacher_benchmark_mode: rcm_trig
teacher_benchmark_include_native_rf_reference: false   # Skip native RF to save time

no_visualize: false
no_save: false

negative_prompt: "blurry, out of focus, overexposed, underexposed, low contrast, washed out colors, excessive noise, grainy texture, poor lighting, flickering, motion blur, distorted proportions, unnatural skin tones, deformed facial features, asymmetrical face, missing facial features, extra limbs, disfigured hands, wrong hand count, artifacts around text, inconsistent perspective, camera shake, incorrect depth of field, background too sharp, background clutter, distracting reflections, harsh shadows, inconsistent lighting direction, color banding, cartoonish rendering, 3D CGI look, unrealistic materials, uncanny valley effect, incorrect ethnicity, wrong gender, exaggerated expressions, wrong gaze direction, mismatched lip sync, silent or muted audio, distorted voice, robotic voice, echo, background noise, off-sync audio, incorrect dialogue, added dialogue, repetitive speech, jittery movement, awkward pauses, incorrect timing, unnatural transitions, inconsistent framing, tilted camera, flat lighting, inconsistent tone, cinematic oversaturation, stylized filters, or AI artifacts."
